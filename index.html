<script>
    // --- ПЕРЕВОД АНИМАЦИЙ НА РУССКИЙ ---
    const animGroups = {
        "Внимание (Акценты)": [
            {v: "bounce", t: "Прыжок (Bounce)"},
            {v: "flash", t: "Вспышка (Flash)"},
            {v: "pulse", t: "Пульсация (Pulse)"},
            {v: "rubberBand", t: "Резинка (RubberBand)"},
            {v: "shakeX", t: "Тряска влево-вправо"},
            {v: "shakeY", t: "Тряска вверх-вниз"},
            {v: "headShake", t: "Покачивание головой"},
            {v: "swing", t: "Раскачивание (Swing)"},
            {v: "tada", t: "Та-дам! (Tada)"},
            {v: "wobble", t: "Валкость (Wobble)"},
            {v: "jello", t: "Желе (Jello)"},
            {v: "heartBeat", t: "Сердцебиение"}
        ],
        "Появление (Вход)": [
            {v: "bounceIn", t: "Упругое появление"},
            {v: "bounceInDown", t: "Упругое падение сверху"},
            {v: "bounceInLeft", t: "Упругий вылет слева"},
            {v: "bounceInRight", t: "Упругий вылет справа"},
            {v: "bounceInUp", t: "Упругий вылет снизу"},
            {v: "fadeIn", t: "Плавное проявление"},
            {v: "fadeInDown", t: "Проявление сверху"},
            {v: "fadeInLeft", t: "Проявление слева"},
            {v: "fadeInRight", t: "Проявление справа"},
            {v: "fadeInUp", t: "Проявление снизу"},
            {v: "flipInX", t: "Кувырок по горизонтали"},
            {v: "flipInY", t: "Кувырок по вертикали"},
            {v: "lightSpeedInRight", t: "Световой вылет справа"},
            {v: "lightSpeedInLeft", t: "Световой вылет слева"},
            {v: "rotateIn", t: "Появление с вращением"},
            {v: "zoomIn", t: "Увеличение (Zoom in)"},
            {v: "slideInUp", t: "Выезд снизу"},
            {v: "slideInDown", t: "Выезд сверху"},
            {v: "slideInLeft", t: "Выезд слева"},
            {v: "slideInRight", t: "Выезд справа"}
        ],
        "Исчезновение (Выход)": [
            {v: "bounceOut", t: "Упругое исчезновение"},
            {v: "bounceOutDown", t: "Упругое падение вниз"},
            {v: "fadeOut", t: "Плавное растворение"},
            {v: "fadeOutDown", t: "Растворение вниз"},
            {v: "flipOutX", t: "Кувырок-исчезновение (X)"},
            {v: "flipOutY", t: "Кувырок-исчезновение (Y)"},
            {v: "lightSpeedOutRight", t: "Световой уход справа"},
            {v: "rotateOut", t: "Исчезновение с вращением"},
            {v: "zoomOut", t: "Уменьшение (Zoom out)"},
            {v: "slideOutDown", t: "Уезд вниз"},
            {v: "slideOutUp", t: "Уезд вверх"},
            {v: "hinge", t: "Отрыв и падение вниз"}
        ]
    };

    document.querySelectorAll('.anim-select').forEach(select => {
        for (const [group, anims] of Object.entries(animGroups)) {
            const optgroup = document.createElement('optgroup');
            optgroup.label = group;
            anims.forEach(anim => {
                const opt = document.createElement('option');
                opt.value = anim.v; opt.innerText = anim.t;
                optgroup.appendChild(opt);
            });
            select.appendChild(optgroup);
        }
    });

    document.getElementById('sel-ent').value = 'bounceIn';
    document.getElementById('sel-inf').value = 'pulse';
    document.getElementById('sel-hov').value = 'tada';
    document.getElementById('sel-clk').value = 'rubberBand';
    document.getElementById('sel-ext').value = 'zoomOut';

    // --- ЛОГИКА ГАЛОЧЕК ---
    function setupStep(stepId) {
        const chk = document.getElementById(`chk-${stepId}`);
        const container = document.getElementById(`step-${stepId}`);
        const body = container.querySelector('.step-body');
        
        chk.addEventListener('change', () => {
            body.style.display = chk.checked ? 'flex' : 'none';
            container.className = chk.checked ? 'timeline-step active' : 'timeline-step';
            playPreviewSequence(); checkCodeSize();
        });
        if(chk.checked) { body.style.display = 'flex'; container.className = 'timeline-step active'; }
    }
    ['ent', 'inf', 'hov', 'clk', 'ext'].forEach(setupStep);

    // Связь ползунков
    const sliders = ['img-quality', 'glow-radius', 'dur-ent', 'del-ent', 'dur-inf', 'dur-hov', 'dur-clk', 'dur-ext', 'del-ext'];
    sliders.forEach(id => {
        const el = document.getElementById(id);
        if(!el) return;
        el.addEventListener('input', (e) => {
            let val = e.target.value;
            if(id === 'img-quality') val += 'px';
            if(id.startsWith('dur') || id.startsWith('del')) val += 's';
            document.getElementById(id + '-val').innerText = val;
            
            if(id === 'img-quality') applyCompression();
            if(id === 'glow-radius') applyVisuals();
        });
    });

    // --- АВТО-ТЕСТ ---
    const previewEl = document.getElementById('preview-element');
    let currentSrc = ''; let originalImg = null; let demoTimer = null;

    function triggerDemo(step) {
        if(!currentSrc || !document.getElementById(`chk-${step}`).checked) return;
        
        const ind = document.getElementById('demo-indicator');
        const selectEl = document.getElementById(`sel-${step}`);
        ind.innerText = 'Тест: ' + selectEl.options[selectEl.selectedIndex].text;
        ind.style.display = 'block';
        
        const eff = selectEl.value;
        const dur = document.getElementById(`dur-${step}`).value + 's';
        
        previewEl.className = '';
        void previewEl.offsetWidth; 
        
        const isInf = (step === 'inf' || step === 'hov');
        previewEl.className = `animate__animated animate__${eff}` + (isInf ? ' animate__infinite' : '');
        previewEl.style.animationDuration = dur;
        previewEl.style.animationDelay = '0s';
        previewEl.style.opacity = 1;

        clearTimeout(demoTimer);
        if(!isInf) {
            previewEl.addEventListener('animationend', function h() {
                previewEl.removeEventListener('animationend', h);
                ind.style.display = 'none';
                playPreviewSequence(); 
            }, {once:true});
        } else {
            demoTimer = setTimeout(() => { 
                ind.style.display = 'none'; 
                playPreviewSequence(); 
            }, 2500);
        }
    }

    ['ent', 'inf', 'hov', 'clk', 'ext'].forEach(step => {
        document.getElementById(`sel-${step}`).addEventListener('change', () => triggerDemo(step));
    });

    // --- ЗАГРУЗКА ---
    document.querySelectorAll('input[name="img-source"]').forEach(r => r.addEventListener('change', e => {
        document.getElementById('image-upload').style.display = e.target.value === 'file' ? 'block' : 'none';
        document.getElementById('image-url').style.display = e.target.value === 'url' ? 'block' : 'none';
        document.getElementById('compression-container').style.display = (e.target.value === 'file' && originalImg) ? 'flex' : 'none';
        checkCodeSize();
    }));

    document.getElementById('image-url').addEventListener('input', e => {
        if (e.target.value) { currentSrc = e.target.value; applyVisuals(); checkCodeSize(); playPreviewSequence(); }
    });

    document.getElementById('image-upload').addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            const img = new Image();
            img.onload = () => {
                originalImg = img;
                document.querySelector('input[value="file"]').checked = true;
                document.getElementById('image-upload').style.display = 'block'; document.getElementById('image-url').style.display = 'none';
                document.getElementById('compression-container').style.display = 'flex';
                document.getElementById('img-quality').value = 300; document.getElementById('quality-val').innerText = '300px';
                applyCompression();
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    });

    function applyCompression() {
        if (!originalImg) return;
        const canvas = document.createElement('canvas');
        const tgtWidth = parseInt(document.getElementById('img-quality').value); 
        let w = originalImg.width, h = originalImg.height;
        if (w > tgtWidth) { h *= tgtWidth / w; w = tgtWidth; }
        
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(originalImg, 0, 0, w, h);
        currentSrc = canvas.toDataURL('image/webp', 0.85);
        applyVisuals(); checkCodeSize(); playPreviewSequence();
    }

    // --- СВЕЧЕНИЕ ---
    document.getElementById('glow-toggle').addEventListener('change', function() {
        document.getElementById('glow-settings').style.display = this.checked ? 'flex' : 'none';
        applyVisuals();
    });
    document.getElementById('glow-color').addEventListener('input', applyVisuals);

    function applyVisuals() {
        if(!currentSrc) return;
        previewEl.src = currentSrc;
        
        if (document.getElementById('glow-toggle').checked) {
            previewEl.style.filter = `drop-shadow(0 0 ${document.getElementById('glow-radius').value}px ${document.getElementById('glow-color').value})`;
        } else {
            previewEl.style.filter = 'none';
        }
    }

    // --- ПЛЕЕР ---
    document.getElementById('play-btn').addEventListener('click', playPreviewSequence);
    let exitTimer = null;

    function playPreviewSequence() {
        if(!currentSrc) return;
        document.getElementById('demo-indicator').style.display = 'none';
        
        previewEl.className = '';
        previewEl.style.animationDuration = ''; previewEl.style.animationDelay = '';
        previewEl.onmouseenter = null; previewEl.onmouseleave = null; previewEl.onclick = null;
        previewEl.style.opacity = 1;
        clearTimeout(exitTimer);
        void previewEl.offsetWidth; 
        
        const cfg = getCfg();
        let state = 'init';

        function playAnim(effect, dur, del, isInf, onEnd) {
            previewEl.className = `animate__animated animate__${effect}` + (isInf ? ' animate__infinite' : '');
            previewEl.style.animationDuration = dur; previewEl.style.animationDelay = del;
            if(onEnd && !isInf) {
                previewEl.addEventListener('animationend', function h(e) {
                    e.stopPropagation(); previewEl.removeEventListener('animationend', h); onEnd();
                }, {once: true});
            }
        }

        function inf() {
            if(!cfg.iOn || state === 'ext') return;
            state = 'inf'; playAnim(cfg.iEff, cfg.iDur, '0s', true, null);
        }

        if(cfg.xOn) {
            exitTimer = setTimeout(() => {
                state = 'ext';
                playAnim(cfg.xEff, cfg.xDur, '0s', false, () => { previewEl.style.opacity = 0; });
            }, parseFloat(cfg.xDel) * 1000);
        }

        if(cfg.cOn) {
            previewEl.onclick = () => {
                if(state === 'ext' || state === 'clk') return;
                state = 'clk'; playAnim(cfg.cEff, cfg.cDur, '0s', false, inf);
            };
        }

        if(cfg.hOn) {
            previewEl.onmouseenter = () => {
                if(state === 'ext' || state === 'clk' || state === 'ent') return;
                state = 'hov'; playAnim(cfg.hEff, cfg.hDur, '0s', true, null);
            };
            previewEl.onmouseleave = () => {
                if(state === 'ext' || state === 'clk' || state === 'ent') return;
                inf();
            };
        }

        if(cfg.eOn) {
            state = 'ent'; playAnim(cfg.eEff, cfg.eDur, cfg.eDel, false, inf);
        } else { inf(); }
    }

    // --- ГЕНЕРАЦИЯ КОДА ---
    function getCfg() {
        return {
            eOn: document.getElementById('chk-ent').checked, eEff: document.getElementById('sel-ent').value, eDur: document.getElementById('dur-ent').value + 's', eDel: document.getElementById('del-ent').value + 's',
            iOn: document.getElementById('chk-inf').checked, iEff: document.getElementById('sel-inf').value, iDur: document.getElementById('dur-inf').value + 's',
            hOn: document.getElementById('chk-hov').checked, hEff: document.getElementById('sel-hov').value, hDur: document.getElementById('dur-hov').value + 's',
            cOn: document.getElementById('chk-clk').checked, cEff: document.getElementById('sel-clk').value, cDur: document.getElementById('dur-clk').value + 's',
            xOn: document.getElementById('chk-ext').checked, xEff: document.getElementById('sel-ext').value, xDur: document.getElementById('dur-ext').value + 's', xDel: document.getElementById('del-ext').value
        };
    }

    function genCode() {
        const c = getCfg();
        const gl = document.getElementById('glow-toggle').checked ? `filter: drop-shadow(0 0 ${document.getElementById('glow-radius').value}px ${document.getElementById('glow-color').value});` : '';

        const script = `
            const el=document.getElementById('el'); let st='init';
            function p(eff,dur,del,inf,end){
                el.className='gen-img animate__animated animate__'+eff+(inf?' animate__infinite':'');
                el.style.animationDuration=dur; el.style.animationDelay=del;
                if(end&&!inf) el.addEventListener('animationend',function h(e){e.stopPropagation();el.removeEventListener('animationend',h);end();},{once:true});
            }
            function inf(){ if(!${c.iOn}||st==='ext') return; st='inf'; p('${c.iEff}','${c.iDur}','0s',true,null); }
            if(${c.xOn}) setTimeout(()=>{ st='ext'; p('${c.xEff}','${c.xDur}','0s',false,()=>{el.style.opacity=0;}); }, ${parseFloat(c.xDel)*1000});
            if(${c.cOn}) el.onclick=()=>{ if(st==='ext'||st==='clk') return; st='clk'; p('${c.cEff}','${c.cDur}','0s',false,inf); };
            if(${c.hOn}){ el.onmouseenter=()=>{ if(st==='ext'||st==='clk'||st==='ent') return; st='hov'; p('${c.hEff}','${c.hDur}','0s',true,null); }; el.onmouseleave=()=>{ if(st==='ext'||st==='clk'||st==='ent') return; inf(); }; }
            if(${c.eOn}){ st='ent'; p('${c.eEff}','${c.eDur}','${c.eDel}',false,inf); } else { inf(); }
        `;

        const html = `
            <style>
                @import url('https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css');
                body{margin:0;padding:0;display:flex;justify-content:center;align-items:center;width:100vw;height:100vh;background:transparent;overflow:hidden;}
                .gen-img{width:auto;height:auto;max-width:75%;max-height:75%;object-fit:contain;cursor:pointer;${gl}}
            </style>
            <img id="el" src="${currentImageSrc}" class="gen-img"/>
            <script>${script}<\/script>
        `;
        return `<iframe style="width:100%; height:100%; border:none; background:transparent;" allowtransparency="true" srcdoc="${html.replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/'/g, "&#39;").replace(/</g, "&lt;").replace(/>/g, "&gt;")}"></iframe>`;
    }

    function checkCodeSize() {
        if (!currentSrc) return;
        const l = document.getElementById('status-light'), i = document.getElementById('code-size-info');
        if (document.querySelector('input[name="img-source"]:checked').value === 'url') {
            l.className = 'status-light light-green'; i.innerText = ''; return;
        }
        const len = genCode().length;
        if (len > 12000) {
            l.className = 'status-light light-red'; i.innerText = `(${Math.round(len/1024)}KB) Уменьшите сжатие!`; i.style.color = '#ff4444';
        } else {
            l.className = 'status-light light-green'; i.innerText = `(${Math.round(len/1024)}KB) OK!`; i.style.color = '#00ff00';
        }
    }

    // --- ЖЕЛЕЗОБЕТОННОЕ КОПИРОВАНИЕ ---
    document.getElementById('copy-btn').addEventListener('click', async () => {
        if (!currentSrc) { alert("Сначала добавьте картинку!"); return; }
        
        const btn = document.getElementById('copy-btn');
        const codeToCopy = genCode();

        const successCopy = () => {
            btn.innerText = "✓ КОД В БУФЕРЕ"; 
            btn.style.background = "#fff"; 
            btn.style.color = "#ff6600";
            setTimeout(() => { 
                btn.innerText = "КОПИРОВАТЬ КОД ДЛЯ GENIALLY"; 
                btn.style.background = ""; 
                btn.style.color = ""; 
            }, 2000);
        };

        try {
            // Пробуем современный метод
            await navigator.clipboard.writeText(codeToCopy);
            successCopy();
        } catch (err) {
            // Если браузер заблокировал (запасной план)
            try {
                const textArea = document.createElement("textarea");
                textArea.value = codeToCopy;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                successCopy();
            } catch (err2) {
                alert("Ошибка! Ваш браузер блокирует копирование. Выделите код внизу и скопируйте вручную (Ctrl+C).");
                console.error(err2);
            }
        }
    });
</script>
</body>
</html>
