<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Genially Animator</title>
    <style>
        @import url('https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css');
        
        :root {
            --primary-color: #ff6600;
            --primary-hover: #ff8533;
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --neon-glow: 0 0 15px rgba(255, 102, 0, 0.4);
            --neon-border: 1px solid var(--primary-color);
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--primary-color); border-radius: 4px; }

        .container {
            display: flex;
            width: 100%;
            padding: 20px;
            gap: 20px;
            height: calc(100vh - 40px);
        }

        .settings {
            flex: 1;
            background: var(--panel-bg);
            padding: 25px;
            border-radius: 12px;
            border: var(--neon-border);
            box-shadow: var(--neon-glow);
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 450px;
            overflow-y: auto;
        }

        .settings h2 { 
            margin-top: 0; 
            font-size: 22px; 
            color: var(--primary-color);
            text-shadow: 0 0 8px rgba(255, 102, 0, 0.5);
        }

        .form-group { 
            display: flex; 
            flex-direction: column; 
            gap: 5px; 
            background: rgba(255,255,255,0.03);
            padding: 10px;
            border-radius: 8px;
        }

        label { font-weight: bold; font-size: 13px; color: #aaa; }
        
        input[type="file"], input[type="text"], select, input[type="color"] {
            padding: 8px;
            background: #2a2a2a;
            color: white;
            border: 1px solid #444;
            border-radius: 6px;
            width: 100%;
            box-sizing: border-box;
            transition: border 0.3s;
        }
        
        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 5px rgba(255, 102, 0, 0.3);
        }

        input[type="range"] { accent-color: var(--primary-color); width: 100%; }
        .range-header { display: flex; justify-content: space-between; align-items: center; }
        .range-value { color: var(--primary-color); font-weight: bold; }

        .radio-group { display: flex; gap: 15px; margin-bottom: 5px; }
        .radio-group label { color: var(--text-color); cursor: pointer; display: flex; align-items: center; gap: 5px;}
        input[type="radio"] { accent-color: var(--primary-color); }

        .checkbox-group { display: flex; align-items: center; gap: 10px; }
        input[type="checkbox"] { accent-color: var(--primary-color); width: 16px; height: 16px; }

        .button-group { display: flex; gap: 10px; margin-top: 10px; }
        
        button {
            flex: 1;
            background-color: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        button:hover { 
            background-color: var(--primary-color); 
            color: #fff;
            box-shadow: var(--neon-glow);
        }
        
        button.primary-btn { background-color: var(--primary-color); color: #fff; }
        button.primary-btn:hover { background-color: var(--primary-hover); }

        .preview-area {
            flex: 2;
            background: #181818;
            border-radius: 12px;
            border: var(--neon-border);
            box-shadow: var(--neon-glow);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 20px 20px;
            transition: background-color 0.3s;
        }
        
        .preview-area.dragover {
            background-color: rgba(255, 102, 0, 0.1);
            border: 2px dashed var(--primary-color);
        }

        .preview-header {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(30, 30, 30, 0.9);
            color: var(--primary-color);
            padding: 5px 12px;
            border-radius: 5px;
            font-weight: bold;
            border: 1px solid var(--primary-color);
            box-shadow: 0 0 10px rgba(255, 102, 0, 0.2);
        }

        .drag-text { position: absolute; bottom: 20px; color: #666; font-size: 14px; }

        #preview-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        #preview-element {
            max-width: 80%;
            max-height: 80%;
            transition: filter 0.3s, transform 0.3s;
            transform-origin: center;
        }
        
        #code-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            align-items: center; justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--panel-bg);
            border: var(--neon-border);
            box-shadow: var(--neon-glow);
            padding: 25px;
            border-radius: 12px;
            width: 600px;
            max-width: 90%;
            color: white;
        }
        textarea {
            width: 100%;
            height: 200px;
            margin: 15px 0;
            font-family: monospace;
            padding: 10px;
            background: #121212;
            color: #00ff00; 
            border: 1px solid #444;
            border-radius: 6px;
            box-sizing: border-box;
            resize: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="settings">
        <h2>NEON ANIMATOR</h2>
        
        <div class="form-group">
            <label>1. Источник изображения</label>
            <div class="radio-group">
                <label><input type="radio" name="img-source" value="file" checked> Файл</label>
                <label><input type="radio" name="img-source" value="url"> Ссылка (URL)</label>
            </div>
            <input type="file" id="image-upload" accept="image/*">
            <input type="text" id="image-url" placeholder="Вставьте прямую ссылку на картинку" style="display: none;">
        </div>

        <div class="form-group">
            <label>2. Триггер анимации</label>
            <select id="trigger-select">
                <option value="entrance">При появлении</option>
                <option value="hover">При наведении мыши</option>
                <option value="click">При клике</option>
                <option value="infinite">Постоянно (зациклено)</option>
            </select>
        </div>

        <div class="form-group">
            <label>3. Эффект анимации</label>
            <select id="animation-select">
                <option value="bounce">Bounce (Прыжок)</option>
                <option value="pulse">Pulse (Пульсация)</option>
                <option value="rubberBand">RubberBand (Резинка)</option>
                <option value="shakeX">Shake (Тряска)</option>
                <option value="tada">Tada (Та-дам!)</option>
                <option value="wobble">Wobble (Качение)</option>
                <option value="heartBeat">HeartBeat (Сердцебиение)</option>
                <option value="fadeIn">Fade In (Плавное появление)</option>
                <option value="zoomIn">Zoom In (Увеличение)</option>
                <option value="slideInUp">Slide Up (Выезд снизу)</option>
                <option value="flip">Flip (Переворот)</option>
                <option value="rotateIn">Rotate In (Вращение)</option>
                <option value="lightSpeedInRight">Light Speed (Быстрый выезд)</option>
                <option value="hinge">Hinge (Отрыв и падение)</option>
                <option value="zoomOut">Zoom Out (Исчезновение)</option>
            </select>
        </div>

        <div class="form-group">
            <div class="range-header">
                <label>Длительность (сек):</label>
                <span class="range-value" id="duration-val">1s</span>
            </div>
            <input type="range" id="anim-duration" min="0.1" max="5" step="0.1" value="1">
            
            <div class="range-header" style="margin-top: 10px;">
                <label>Задержка старта (сек):</label>
                <span class="range-value" id="delay-val">0s</span>
            </div>
            <input type="range" id="anim-delay" min="0" max="5" step="0.1" value="0">
        </div>

        <div class="form-group">
            <div class="range-header">
                <label>Масштаб картинки (%):</label>
                <span class="range-value" id="scale-val">100%</span>
            </div>
            <input type="range" id="img-scale" min="10" max="200" step="5" value="100">
        </div>

        <div class="form-group">
            <div class="checkbox-group">
                <input type="checkbox" id="glow-toggle">
                <label for="glow-toggle">Добавить свечение</label>
            </div>
            
            <div id="glow-settings" style="display: none; margin-top: 10px;">
                <div style="display: flex; gap: 10px;">
                    <div style="flex: 1;">
                        <label>Цвет</label>
                        <input type="color" id="glow-color" value="#ff6600">
                    </div>
                    <div style="flex: 2;">
                        <div class="range-header">
                            <label>Радиус (px)</label>
                            <span class="range-value" id="glow-radius-val">15</span>
                        </div>
                        <input type="range" id="glow-radius" min="1" max="50" value="15">
                    </div>
                </div>
            </div>
        </div>

        <div class="button-group">
            <button id="reset-btn">Сбросить</button>
            <button id="copy-btn" class="primary-btn">СКОПИРОВАТЬ КОД</button>
        </div>
    </div>

    <div class="preview-area" id="drop-zone">
        <div class="preview-header">Превью (Drag & Drop)</div>
        <div id="preview-wrapper">
            <img id="preview-element" src="https://via.placeholder.com/300x200/2a2a2a/ff6600?text=Загрузите+изображение" alt="Preview">
        </div>
        <div class="drag-text">Перетащите картинку сюда</div>
    </div>
</div>

<div id="code-modal">
    <div class="modal-content">
        <h3 style="color: var(--primary-color); margin-top: 0;">Готовый код для Genially</h3>
        <p>Вставьте этот код в блок "Insert -> Others -> Custom HTML":</p>
        <textarea id="code-output" readonly></textarea>
        <button onclick="document.getElementById('code-modal').style.display='none'" style="width: 100%;">ЗАКРЫТЬ</button>
    </div>
</div>

<script>
    const sourceRadios = document.querySelectorAll('input[name="img-source"]');
    const imageUpload = document.getElementById('image-upload');
    const imageUrl = document.getElementById('image-url');
    const previewElement = document.getElementById('preview-element');
    const dropZone = document.getElementById('drop-zone');
    
    const triggerSelect = document.getElementById('trigger-select');
    const animationSelect = document.getElementById('animation-select');
    const animDuration = document.getElementById('anim-duration');
    const animDelay = document.getElementById('anim-delay');
    const imgScale = document.getElementById('img-scale');
    
    const glowToggle = document.getElementById('glow-toggle');
    const glowSettings = document.getElementById('glow-settings');
    const glowColor = document.getElementById('glow-color');
    const glowRadius = document.getElementById('glow-radius');
    
    const copyBtn = document.getElementById('copy-btn');
    const resetBtn = document.getElementById('reset-btn');
    const codeOutput = document.getElementById('code-output');
    const codeModal = document.getElementById('code-modal');

    let currentImageSrc = '';

    sourceRadios.forEach(radio => {
        radio.addEventListener('change', (e) => {
            if (e.target.value === 'file') {
                imageUpload.style.display = 'block';
                imageUrl.style.display = 'none';
            } else {
                imageUpload.style.display = 'none';
                imageUrl.style.display = 'block';
            }
        });
    });

    imageUrl.addEventListener('input', (e) => {
        if (e.target.value) {
            currentImageSrc = e.target.value;
            previewElement.src = currentImageSrc;
            updatePreview();
        }
    });

    function handleFile(file) {
        if (!file || !file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                // Сжимаем картинку, чтобы код не превышал лимиты Genially
                const MAX_WIDTH = 400; 
                let width = img.width;
                let height = img.height;
                if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                
                currentImageSrc = canvas.toDataURL(file.type === 'image/png' ? 'image/png' : 'image/jpeg', 0.7);
                previewElement.src = currentImageSrc;
                
                document.querySelector('input[value="file"]').checked = true;
                imageUpload.style.display = 'block';
                imageUrl.style.display = 'none';
                updatePreview();
            }
            img.src = event.target.result;
        }
        reader.readAsDataURL(file);
    }

    imageUpload.addEventListener('change', (e) => handleFile(e.target.files[0]));

    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });

    function updateLabels() {
        document.getElementById('duration-val').innerText = animDuration.value + 's';
        document.getElementById('delay-val').innerText = animDelay.value + 's';
        document.getElementById('scale-val').innerText = imgScale.value + '%';
        document.getElementById('glow-radius-val').innerText = glowRadius.value;
    }

    const inputs = [triggerSelect, animationSelect, animDuration, animDelay, imgScale, glowColor, glowRadius];
    inputs.forEach(input => input.addEventListener('input', () => { updateLabels(); updatePreview(); }));
    
    glowToggle.addEventListener('change', function() {
        glowSettings.style.display = this.checked ? 'block' : 'none';
        updatePreview();
    });

    function updatePreview() {
        if (!currentImageSrc) return;
        
        previewElement.className = '';
        const animName = animationSelect.value;
        const trigger = triggerSelect.value;
        
        previewElement.style.transform = `scale(${imgScale.value / 100})`;
        
        if (glowToggle.checked) {
            previewElement.style.filter = `drop-shadow(0 0 ${glowRadius.value}px ${glowColor.value})`;
        } else {
            previewElement.style.filter = 'none';
        }

        previewElement.style.animationDuration = `${animDuration.value}s`;
        previewElement.style.animationDelay = `${animDelay.value}s`;

        if (trigger === 'entrance') {
            previewElement.classList.add('animate__animated', `animate__${animName}`);
        } else if (trigger === 'infinite') {
            previewElement.classList.add('animate__animated', `animate__${animName}`, 'animate__infinite');
        } else if (trigger === 'hover') {
            previewElement.onmouseenter = () => {
                previewElement.classList.remove('animate__animated', `animate__${animName}`);
                void previewElement.offsetWidth;
                previewElement.classList.add('animate__animated', `animate__${animName}`);
            };
            previewElement.onmouseleave = null;
        } else if (trigger === 'click') {
            previewElement.onclick = () => {
                previewElement.classList.remove('animate__animated', `animate__${animName}`);
                void previewElement.offsetWidth;
                previewElement.classList.add('animate__animated', `animate__${animName}`);
            };
        }

        if (trigger === 'entrance' || trigger === 'infinite') {
            previewElement.classList.remove('animate__animated', `animate__${animName}`);
            void previewElement.offsetWidth;
            previewElement.classList.add('animate__animated', `animate__${animName}`);
        }
    }

    resetBtn.addEventListener('click', () => {
        triggerSelect.value = 'entrance';
        animationSelect.value = 'bounce';
        animDuration.value = 1;
        animDelay.value = 0;
        imgScale.value = 100;
        glowToggle.checked = false;
        glowSettings.style.display = 'none';
        glowColor.value = '#ff6600';
        glowRadius.value = 15;
        updateLabels();
        updatePreview();
    });

    copyBtn.addEventListener('click', () => {
        if (!currentImageSrc) {
            alert("Сначала загрузите картинку или вставьте ссылку!");
            return;
        }

        const animName = animationSelect.value;
        const trigger = triggerSelect.value;
        const scale = imgScale.value / 100;
        const glowFilter = glowToggle.checked ? `filter: drop-shadow(0 0 ${glowRadius.value}px ${glowColor.value});` : '';
        const timings = `--animate-duration: ${animDuration.value}s; --animate-delay: ${animDelay.value}s;`;
        
        // ВАЖНО: Формируем внутренний HTML
        let innerHTML = `
            <style>
                @import url('https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css');
                body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; width: 100vw; height: 100vh; background: transparent; overflow: hidden; }
                .gen-img { transform: scale(${scale}); max-width: 100%; max-height: 100%; object-fit: contain; cursor: pointer; ${glowFilter} ${timings} }
        `;

        if (trigger === 'hover') {
            innerHTML += ` body:hover .gen-img { animation: ${animName} ${animDuration.value}s ease ${animDelay.value}s forwards; }\n`;
        }
        innerHTML += `</style>\n`;

        if (trigger === 'entrance') {
            innerHTML += `<img src="${currentImageSrc}" class="gen-img animate__animated animate__${animName}" />\n`;
        } else if (trigger === 'infinite') {
            innerHTML += `<img src="${currentImageSrc}" class="gen-img animate__animated animate__${animName} animate__infinite" />\n`;
        } else if (trigger === 'hover') {
            innerHTML += `<img src="${currentImageSrc}" class="gen-img animate__animated" />\n`;
        } else if (trigger === 'click') {
            innerHTML += `<img src="${currentImageSrc}" class="gen-img" onclick="this.classList.remove('animate__animated', 'animate__${animName}'); void this.offsetWidth; this.classList.add('animate__animated', 'animate__${animName}');" />\n`;
        }

        // Волшебство: Экранируем символы, чтобы вставить код внутрь атрибута srcdoc у iframe
        const escapedHTML = innerHTML
            .replace(/&/g, "&amp;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");

        // Оборачиваем всё в iframe! Genially это обожает.
        let htmlSnippet = `<iframe style="width: 100%; height: 100%; border: none; background: transparent;" allowtransparency="true" srcdoc="${escapedHTML}"></iframe>`;

        codeOutput.value = htmlSnippet;
        codeModal.style.display = 'flex';
        
        navigator.clipboard.writeText(htmlSnippet).then(() => {
            const originalText = copyBtn.innerText;
            copyBtn.innerText = "СКОПИРОВАНО!";
            copyBtn.style.backgroundColor = "#fff";
            copyBtn.style.color = "#ff6600";
            setTimeout(() => {
                copyBtn.innerText = originalText;
                copyBtn.style.backgroundColor = "";
                copyBtn.style.color = "";
            }, 2000);
        });
    });
</script>

</body>
</html>
